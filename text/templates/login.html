<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 墙体裂缝检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="login-card">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">墙体裂缝检测系统</h3>
                        {% if error %}
                        <div class="alert alert-danger py-2">{{ error }}</div>
                        {% endif %}
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input name="password" type="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登 录</button>
                        </form>
                        <p class="text-center text-muted small mt-3">默认管理员: admin / admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
