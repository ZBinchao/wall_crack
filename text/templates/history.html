{% extends "base.html" %}
{% block title %}历史查询{% endblock %}
{% block content %}
<h4 class="mb-3">历史查询</h4>

<form class="row g-2 mb-3" id="filterForm">
    <div class="col-auto">
        <input name="date_from" type="date" class="form-control form-control-sm" placeholder="开始日期">
    </div>
    <div class="col-auto">
        <input name="date_to" type="date" class="form-control form-control-sm" placeholder="结束日期">
    </div>
    <div class="col-auto">
        <input name="location" class="form-control form-control-sm" placeholder="地点">
    </div>
    <div class="col-auto">
        <select name="severity" class="form-select form-select-sm">
            <option value="">全部严重程度</option>
            <option value="low">轻微</option>
            <option value="medium">中等</option>
            <option value="high">严重</option>
        </select>
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-outline-secondary btn-sm">筛选</button>
    </div>
</form>

<div id="resultArea" class="row g-2"></div>
<nav class="mt-3"><ul class="pagination pagination-sm justify-content-center" id="pagination"></ul></nav>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1, totalPages = 1;

function loadData(page) {
    const f = document.getElementById('filterForm').elements;
    const params = new URLSearchParams({
        page: page,
        date_from: f.date_from.value,
        date_to: f.date_to.value,
        location: f.location.value,
        severity: f.severity.value
    });

    fetch('/history/data?' + params)
        .then(r => r.json())
        .then(d => {
            totalPages = Math.ceil(d.total / d.per_page) || 1;
            currentPage = d.page;

            const area = document.getElementById('resultArea');
            if (d.items.length === 0) {
                area.innerHTML = '<p class="text-muted">无匹配记录</p>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            area.innerHTML = d.items.map(item => `
                <div class="col-md-3 col-sm-4 col-6">
                    <div class="card h-100">
                        <img src="${item.image_url}" class="card-img-top" style="height:120px;object-fit:cover" alt="裂纹">
                        <div class="card-body p-2 small">
                            <span class="badge bg-${item.severity === 'high' ? 'danger' : item.severity === 'medium' ? 'warning' : 'info'}">
                                ${({'low':'轻微','medium':'中等','high':'严重'})[item.severity] || item.severity}
                            </span>
                            <span class="text-muted">${item.confidence.toFixed(2)}</span>
                            <div class="text-truncate text-muted" title="${item.location || ''}">${item.location || '-'}</div>
                            <div class="text-muted" style="font-size:.75rem">${item.created_at}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            // 分页
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadData(${i});return false">${i}</a>
                </li>`;
            }
            document.getElementById('pagination').innerHTML = html;
        });
}

document.getElementById('filterForm').addEventListener('submit', e => {
    e.preventDefault();
    loadData(1);
});

loadData(1);
</script>
{% endblock %}
